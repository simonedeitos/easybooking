<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{email_title}}</title>
    <style>
        body { margin:0; padding:0; background:#f4f7fb; color:#1f2937; font-family:Arial, Helvetica, sans-serif; }
        .preheader { display:none!important; visibility:hidden; opacity:0; color:transparent; height:0; width:0; overflow:hidden; }
        .wrapper { width:100%; padding:24px 0; }
        .container { width:100%; max-width:760px; margin:0 auto; background:#ffffff; border:1px solid #dbe3ef; border-radius:16px; overflow:hidden; }
        .header { padding:28px 32px 18px; background:linear-gradient(135deg,#0d6efd 0%,#4f46e5 100%); color:#ffffff; }
        .header h1 { margin:0; font-size:26px; line-height:1.2; }
        .header p { margin:10px 0 0; color:rgba(255,255,255,0.85); font-size:14px; }
        .body { padding:32px; }
        .eyebrow { display:inline-block; margin:0 0 12px; font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#2563eb; }
        h2 { margin:26px 0 12px; font-size:18px; line-height:1.3; color:#111827; }
        p { margin:0 0 14px; font-size:15px; line-height:1.65; }
        .summary-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin:18px 0 24px; }
        .summary-card { padding:16px; border:1px solid #dbe3ef; border-radius:12px; background:#f8fbff; }
        .summary-label { display:block; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:#64748b; }
        .summary-value { display:block; margin-top:8px; font-size:24px; font-weight:700; color:#0f172a; }
        .summary-detail { display:block; margin-top:6px; font-size:13px; color:#475569; }
        .data-table { width:100%; border-collapse:collapse; margin:14px 0 18px; font-size:14px; }
        .data-table th, .data-table td { padding:12px 14px; border:1px solid #dbe3ef; vertical-align:top; }
        .data-table th { background:#eff6ff; font-weight:700; color:#0f172a; }
        .align-right { text-align:right; }
        .align-center { text-align:center; }
        .bullet-list { margin:12px 0 0; padding-left:20px; }
        .bullet-list li { margin-bottom:8px; font-size:14px; line-height:1.5; }
        .empty-state, .code-block { padding:14px 16px; border:1px dashed #cbd5e1; border-radius:12px; background:#f8fafc; color:#475569; font-size:14px; }
        .code-block { white-space:pre-wrap; font-family:Consolas, Monaco, monospace; }
        .footer { padding:18px 32px 28px; border-top:1px solid #e5e7eb; color:#64748b; font-size:13px; line-height:1.6; background:#f8fafc; }
        @media only screen and (max-width: 640px) {
            .wrapper { padding:0; }
            .container { border-radius:0; border-left:none; border-right:none; }
            .header, .body, .footer { padding-left:18px; padding-right:18px; }
        }
    </style>
</head>
<body>
    <div class="preheader">{{preheader}}</div>
    <div class="wrapper">
        <div class="container">
            <div class="header">
                <h1>{{app_name}}</h1>
                <p>{{email_title}}</p>
            </div>
            <div class="body">
                {{content}}
            </div>
            <div class="footer">
                <div><strong>Generato il:</strong> {{generated_at}}</div>
                <div>{{footer_note}}</div>
            </div>
        </div>
    </div>
</body>
</html>
